spec:
  template:
    metadata:
      labels:
        ibac.kagenti.io/injected: "true"
        # Exclude from Istio Ambient so its CNI-installed iptables don't collide with IBAC's.
        istio.io/dataplane-mode: "none"
    spec:
      initContainers:
      - name: ibac-iptables-init
        image: alpine:3.19
        command: ["/bin/sh","-c"]
        args:
        - |
          set -e
          apk add --no-cache iptables iptables-legacy
          # Kind/Kagenti nodes use iptables-legacy; nft tables are invisible to the kernel path.
          IPT=iptables-legacy
          $IPT -t nat -N IBAC_REDIRECT 2>/dev/null || $IPT -t nat -F IBAC_REDIRECT
          $IPT -t nat -A IBAC_REDIRECT -m owner --uid-owner 101  -j RETURN
          $IPT -t nat -A IBAC_REDIRECT -m owner --uid-owner 1337 -j RETURN
          $IPT -t nat -A IBAC_REDIRECT -d 127.0.0.1/32 -j RETURN
          $IPT -t nat -A IBAC_REDIRECT -p tcp --dport 53 -j RETURN
          # Port 443 (HTTPS) goes to the TLS-passthrough listener; everything
          # else goes to the plaintext HTTP listener where ext_proc can inspect.
          $IPT -t nat -A IBAC_REDIRECT -p tcp --dport 443 -j REDIRECT --to-port 10003
          $IPT -t nat -A IBAC_REDIRECT -p tcp -j REDIRECT --to-port 10001
          $IPT -t nat -C OUTPUT -p tcp -j IBAC_REDIRECT 2>/dev/null || $IPT -t nat -A OUTPUT -p tcp -j IBAC_REDIRECT
          # Inbound: redirect pod-ingress traffic on the agent port (8000) to
          # Envoy's inbound listener (10002) so the sidecar sees user intent.
          $IPT -t nat -N IBAC_INBOUND 2>/dev/null || $IPT -t nat -F IBAC_INBOUND
          $IPT -t nat -A IBAC_INBOUND -p tcp --dport 8000 -j REDIRECT --to-port 10002
          $IPT -t nat -C PREROUTING -p tcp -j IBAC_INBOUND 2>/dev/null || $IPT -t nat -A PREROUTING -p tcp -j IBAC_INBOUND
          # kubectl port-forward enters the pod over lo (127.0.0.1:8000), which
          # bypasses PREROUTING. Redirect those packets too, but exempt Envoy
          # itself (uid 101) so its forward to 127.0.0.1:8000 (local_agent_cluster)
          # isn't looped back to its own inbound listener.
          $IPT -t nat -N IBAC_LOCAL_INBOUND 2>/dev/null || $IPT -t nat -F IBAC_LOCAL_INBOUND
          $IPT -t nat -A IBAC_LOCAL_INBOUND -m owner --uid-owner 101 -j RETURN
          $IPT -t nat -A IBAC_LOCAL_INBOUND -p tcp --dport 8000 -j REDIRECT --to-port 10002
          $IPT -t nat -C OUTPUT -d 127.0.0.1/32 -p tcp --dport 8000 -j IBAC_LOCAL_INBOUND 2>/dev/null || $IPT -t nat -I OUTPUT -d 127.0.0.1/32 -p tcp --dport 8000 -j IBAC_LOCAL_INBOUND
          echo "iptables-legacy rules installed"
          $IPT -t nat -L IBAC_REDIRECT -v -n
          $IPT -t nat -L IBAC_INBOUND -v -n
          $IPT -t nat -L IBAC_LOCAL_INBOUND -v -n
          $IPT -t nat -L OUTPUT -v -n
          $IPT -t nat -L PREROUTING -v -n
        securityContext:
          capabilities:
            add: ["NET_ADMIN"]
          runAsUser: 0
      containers:
      - name: envoy
        image: envoyproxy/envoy:v1.28-latest
        ports:
        - containerPort: 10001
          name: ibac-outbound
        command: ["envoy","-c","/etc/envoy/envoy.yaml","--log-level","info"]
        volumeMounts:
        - name: ibac-envoy-config
          mountPath: /etc/envoy
        securityContext:
          runAsUser: 101
      - name: ibac-sidecar
        image: localhost/ibac-sidecar:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9090
          name: ibac-grpc
        env:
        - name: OLLAMA_URL
          value: "http://host.docker.internal:11434"
        - name: TRUSTED_DESTINATIONS
          # Bypass validation for infra/LLM calls; only external tool calls get validated.
          value: "ete-litellm.ai-models.vpc-int.res.ibm.com,ete-litellm.ai-models.vpc-int.res.ibm.com:443,exgentic-mcp-gsm8k-mcp:8000,exgentic-mcp-gsm8k-mcp.team1.svc.cluster.local:8000,keycloak.keycloak.svc.cluster.local:8080,otel-collector.kagenti-system.svc.cluster.local:8335,host.docker.internal:11434"
        # If the ibac-intent-prompt ConfigMap exists, the sidecar reads the
        # prompt from this path. Otherwise it falls back to the baked-in copy.
        - name: INTENT_PROMPT_PATH
          value: /etc/ibac/intent_prompt.txt
        volumeMounts:
        - name: ibac-intent-prompt
          mountPath: /etc/ibac
          readOnly: true
        securityContext:
          runAsUser: 1337
      volumes:
      - name: ibac-envoy-config
        configMap:
          name: ibac-envoy-config
      # optional=true: pod still starts if the ConfigMap is missing, and the
      # sidecar will fall back to the baked-in default prompt.
      - name: ibac-intent-prompt
        configMap:
          name: ibac-intent-prompt
          optional: true
