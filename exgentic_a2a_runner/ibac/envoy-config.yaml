apiVersion: v1
kind: ConfigMap
metadata:
  name: ibac-envoy-config
  namespace: team1
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          protocol: TCP
          address: 127.0.0.1
          port_value: 9901

    static_resources:
      listeners:
      - name: outbound_listener
        address:
          socket_address:
            protocol: TCP
            address: 0.0.0.0
            port_value: 10001
        # 32 MiB per connection. Default is 1 MiB, too small for LLM requests that
        # carry hundreds of tool schemas (appworld: 468 tools).
        per_connection_buffer_limit_bytes: 33554432
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: outbound_http
              codec_type: AUTO
              route_config:
                name: outbound_routes
                virtual_hosts:
                - name: catch_all
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: dynamic_forward_proxy_cluster
                      timeout: 300s
              http_filters:
              - name: envoy.filters.http.lua
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                  inline_code: |
                    function envoy_on_request(request_handle)
                      request_handle:headers():add("x-ibac-direction", "outbound")
                    end
              - name: envoy.filters.http.dynamic_forward_proxy
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_forward_proxy.v3.FilterConfig
                  dns_cache_config:
                    name: dynamic_forward_proxy_dns_cache
                    dns_lookup_family: V4_ONLY
              - name: envoy.filters.http.ext_proc
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                  grpc_service:
                    envoy_grpc:
                      cluster_name: ext_proc_cluster
                    timeout: 120s
                  # Large tool schemas (e.g. appworld's 468 tools) produce multi-hundred-KB
                  # request bodies on each LLM call. Raise the message timeout so
                  # multi-step agent runs don't hit 503/504.
                  max_message_timeout: 120s
                  message_timeout: 120s
                  processing_mode:
                    request_header_mode: SEND
                    request_body_mode: BUFFERED
                    response_header_mode: SEND
                    response_body_mode: NONE
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
              # Give long-running agent calls (multi-step LLM reasoning with huge
              # tool schemas) room to breathe. Defaults are 5min / 5min / unlimited.
              stream_idle_timeout: 600s
              request_timeout: 600s
              common_http_protocol_options:
                idle_timeout: 600s

      # TLS passthrough listener for HTTPS upstreams. iptables redirects port 443
       # here; we sniff SNI to pick the destination host and TCP-proxy through the
      # dynamic_forward_proxy DNS cache. End-to-end TLS is preserved; IBAC can
      # observe connection metadata (host, timing) but not request bodies.
      - name: outbound_tls_listener
        address:
          socket_address:
            protocol: TCP
            address: 0.0.0.0
            port_value: 10003
        per_connection_buffer_limit_bytes: 33554432
        listener_filters:
        - name: envoy.filters.listener.tls_inspector
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.listener.tls_inspector.v3.TlsInspector
        filter_chains:
        - filters:
          - name: envoy.filters.network.sni_dynamic_forward_proxy
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.sni_dynamic_forward_proxy.v3.FilterConfig
              port_value: 443
              dns_cache_config:
                name: dynamic_forward_proxy_dns_cache
                dns_lookup_family: V4_ONLY
          - name: envoy.filters.network.tcp_proxy
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
              stat_prefix: outbound_tls
              cluster: dynamic_forward_proxy_cluster
              idle_timeout: 600s

      - name: inbound_listener
        address:
          socket_address:
            protocol: TCP
            address: 0.0.0.0
            port_value: 10002
        per_connection_buffer_limit_bytes: 33554432
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: inbound_http
              codec_type: AUTO
              route_config:
                name: inbound_routes
                virtual_hosts:
                - name: to_agent
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: local_agent_cluster
                      timeout: 600s
              http_filters:
              # Tag direction so the sidecar knows which phase to run.
              # A2A body parsing is handled in the forked sidecar (kellyabuelsaad/ibac).
              - name: envoy.filters.http.lua
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                  inline_code: |
                    function envoy_on_request(request_handle)
                      request_handle:headers():add("x-ibac-direction", "inbound")
                    end
              - name: envoy.filters.http.ext_proc
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                  grpc_service:
                    envoy_grpc:
                      cluster_name: ext_proc_cluster
                    timeout: 120s
                  max_message_timeout: 120s
                  message_timeout: 120s
                  processing_mode:
                    request_header_mode: SEND
                    request_body_mode: BUFFERED
                    response_header_mode: SEND
                    response_body_mode: NONE
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
              # A2A message/send for multi-step agents (especially appworld) can take
              # many minutes. Allow up to 10min per request.
              stream_idle_timeout: 600s
              request_timeout: 600s
              common_http_protocol_options:
                idle_timeout: 600s

      clusters:
      - name: ext_proc_cluster
        connect_timeout: 5s
        type: STATIC
        http2_protocol_options: {}
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: ext_proc_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: 127.0.0.1
                    port_value: 9090

      - name: dynamic_forward_proxy_cluster
        connect_timeout: 30s
        per_connection_buffer_limit_bytes: 33554432
        lb_policy: CLUSTER_PROVIDED
        cluster_type:
          name: envoy.clusters.dynamic_forward_proxy
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.clusters.dynamic_forward_proxy.v3.ClusterConfig
            dns_cache_config:
              name: dynamic_forward_proxy_dns_cache
              dns_lookup_family: V4_ONLY

      - name: local_agent_cluster
        connect_timeout: 1s
        type: STATIC
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: local_agent_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: 127.0.0.1
                    port_value: 8000
